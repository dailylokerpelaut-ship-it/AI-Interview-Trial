document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ===========================================================\n   TOKENS\n   =========================================================== */\n:root{\n  --navy-900:#0a1b2e;\n  --navy-800:#0f2a44;\n  --navy-700:#163657;\n  --navy-600:#1f4670;\n  --navy-500:#2a5a8a;\n  --ink:#0a1b2e;\n  --ink-2:#34495e;\n  --muted:#6b7d92;\n  --line:#dde6ef;\n  --line-2:#eef2f7;\n\n  --bg:#ffffff;\n  --bg-soft:#f4f8fc;\n  --bg-cyan:#eaf3fa;\n  --bg-cyan-2:#dceaf5;\n\n  --teal:#16a8a0;\n  --teal-700:#0e857f;\n  --teal-soft:#e2f6f4;\n\n  --orange:#ff7a2e;\n  --orange-700:#e3611a;\n  --orange-soft:#fff0e6;\n\n  --shadow-sm:0 1px 2px rgba(10,27,46,.06), 0 1px 1px rgba(10,27,46,.04);\n  --shadow-md:0 8px 24px -10px rgba(10,27,46,.18), 0 2px 6px rgba(10,27,46,.06);\n  --shadow-lg:0 24px 60px -24px rgba(10,27,46,.28), 0 8px 20px -12px rgba(10,27,46,.12);\n  --shadow-cta:0 14px 30px -10px rgba(255,122,46,.55), 0 4px 10px rgba(255,122,46,.25);\n\n  --r-sm:10px;\n  --r-md:14px;\n  --r-lg:20px;\n  --r-xl:28px;\n\n  --container:1120px;\n  --pad-x:clamp(18px, 4vw, 32px);\n\n  --font-sans:\"Plus Jakarta Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;\n  --font-mono:\"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n}\n\n/* ===========================================================\n   RESET\n   =========================================================== */\n*,*::before,*::after{box-sizing:border-box}\nhtml{-webkit-text-size-adjust:100%; scroll-behavior:smooth}\nbody{\n  margin:0;\n  font-family:var(--font-sans);\n  color:var(--ink);\n  background:var(--bg);\n  line-height:1.5;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\nimg,svg{display:block; max-width:100%}\nbutton{font-family:inherit; cursor:pointer; border:0; background:none}\na{color:inherit; text-decoration:none}\nh1,h2,h3,h4,p{margin:0}\nh1,h2,h3,h4{text-wrap:balance; letter-spacing:-0.015em}\np{text-wrap:pretty}\n\n/* ===========================================================\n   LAYOUT\n   =========================================================== */\n.wrap{\n  max-width:var(--container);\n  margin:0 auto;\n  padding:0 var(--pad-x);\n}\n\nsection{\n  padding:72px 0;\n  position:relative;\n}\n@media (min-width:760px){ section{padding:96px 0} }\n\n/* ===========================================================\n   NAV\n   =========================================================== */\n.nav{\n  position:sticky; top:0; z-index:50;\n  background:rgba(255,255,255,.85);\n  backdrop-filter:saturate(180%) blur(14px);\n  -webkit-backdrop-filter:saturate(180%) blur(14px);\n  border-bottom:1px solid rgba(221,230,239,.7);\n}\n.nav-inner{\n  display:flex; align-items:center; justify-content:space-between;\n  height:62px;\n}\n.brand{\n  display:flex; align-items:center; gap:10px;\n  font-weight:700; font-size:15px; color:var(--ink);\n}\n.brand-mark{\n  width:30px; height:30px; border-radius:9px;\n  background:linear-gradient(140deg, var(--navy-800), var(--navy-600) 60%, var(--teal));\n  display:grid; place-items:center;\n  box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 4px 10px -4px rgba(10,27,46,.4);\n}\n.brand-mark svg{width:16px; height:16px; color:#fff}\n.brand small{display:block; font-weight:500; font-size:11px; color:var(--muted); letter-spacing:.02em; margin-top:-2px}\n.nav-cta{\n  font-size:13px; font-weight:600;\n  padding:9px 14px; border-radius:999px;\n  background:var(--ink); color:#fff;\n  transition:transform .2s ease, background .2s ease;\n}\n.nav-cta:hover{background:var(--navy-700); transform:translateY(-1px)}\n@media (max-width:520px){\n  .nav-cta{padding:8px 12px; font-size:12.5px}\n  .brand small{display:none}\n}\n\n/* ===========================================================\n   BUTTONS\n   =========================================================== */\n.btn{\n  display:inline-flex; align-items:center; justify-content:center; gap:8px;\n  font-weight:700; font-size:15px;\n  padding:14px 22px;\n  border-radius:14px;\n  transition:transform .18s ease, box-shadow .25s ease, background .2s ease, color .2s ease;\n  white-space:nowrap;\n}\n.btn-primary{\n  background:var(--orange); color:#fff;\n  box-shadow:var(--shadow-cta);\n}\n.btn-primary:hover{ transform:translateY(-2px); background:var(--orange-700) }\n.btn-primary.pulse{ animation:ctaPulse 3.4s ease-in-out infinite }\n@keyframes ctaPulse{\n  0%,100%{ box-shadow:0 14px 30px -10px rgba(255,122,46,.55), 0 4px 10px rgba(255,122,46,.25), 0 0 0 0 rgba(255,122,46,0) }\n  50%{ box-shadow:0 14px 30px -10px rgba(255,122,46,.55), 0 4px 10px rgba(255,122,46,.25), 0 0 0 10px rgba(255,122,46,0) }\n}\n.btn-ghost{\n  background:#fff; color:var(--ink);\n  border:1px solid var(--line);\n}\n.btn-ghost:hover{ border-color:var(--navy-500); transform:translateY(-2px) }\n.btn-dark{\n  background:var(--ink); color:#fff;\n}\n.btn-dark:hover{ background:var(--navy-700); transform:translateY(-2px) }\n\n/* ===========================================================\n   HERO\n   =========================================================== */\n.hero{\n  padding-top:54px;\n  padding-bottom:84px;\n  background:\n    radial-gradient(1200px 500px at 85% -10%, rgba(22,168,160,.10), transparent 60%),\n    linear-gradient(180deg, #f7fbfe 0%, #ffffff 70%);\n  overflow:hidden;\n  isolation:isolate;\n}\n.hero-grid{\n  display:grid;\n  grid-template-columns:1fr;\n  gap:48px;\n  align-items:center;\n}\n@media (min-width:960px){\n  .hero-grid{grid-template-columns: 1.05fr .95fr; gap:64px}\n}\n\n.badges{\n  display:flex; flex-wrap:wrap; gap:8px;\n  margin-bottom:22px;\n}\n.badge{\n  display:inline-flex; align-items:center; gap:6px;\n  font-size:12px; font-weight:600;\n  padding:6px 11px; border-radius:999px;\n  background:#fff; border:1px solid var(--line);\n  color:var(--ink-2);\n} -columns:repeat(auto-fit, minmax(240px,1fr));\n  gap:12px;\n}\n.benefit{\n  display:flex; align-items:flex-start; gap:12px;\n  padding:16px 18px;\n  background:#fff;\n  border:1px solid var(--line);\n  border-radius:var(--r-md);\n  transition:border-color .2s ease, transform .2s ease;\n}\n.benefit:hover{ border-color:var(--teal); transform:translateY(-2px) }\n.benefit .check{\n  width:26px; height:26px; flex-shrink:0;\n  border-radius:8px;\n  background:var(--teal-soft); color:var(--teal-700);\n  display:grid; place-items:center;\n}\n.benefit .check svg{ width:14px; height:14px }\n.benefit p{ font-size:14px; font-weight:600; color:var(--ink); line-height:1.4 }\n.note-card{\n  margin-top:28px;\n  padding:18px 22px;\n  background:var(--bg-cyan);\n  border-left:3px solid var(--teal);\n  border-radius:0 var(--r-md) var(--r-md) 0;\n  font-size:14px; color:var(--navy-800);\n  font-style:italic;\n}\n\n/* ===========================================================\n   EXAMPLE SECTION\n   =========================================================== */\n.example-section{\n  background:linear-gradient(180deg, #ffffff 0%, #f4f8fc 100%);\n}\n.ex-grid{\n  margin-top:44px;\n  display:grid;\n  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));\n  gap:18px;\n}\n.ex-card{\n  background:#fff;\n  border:1px solid var(--line);\n  border-radius:var(--r-lg);\n  padding:24px 22px;\n  display:flex; flex-direction:column;\n  transition:transform .25s ease, box-shadow .3s ease, border-color .25s ease;\n}\n.ex-card:hover{\n  transform:translateY(-4px);\n  box-shadow:var(--shadow-md);\n  border-color:#c8d5e2;\n}\n.ex-head{\n  display:flex; align-items:center; gap:12px;\n  margin-bottom:18px;\n}\n.ex-icon{\n  width:42px; height:42px; border-radius:11px;\n  display:grid; place-items:center;\n  flex-shrink:0;\n}\n.ex-icon svg{ width:20px; height:20px }\n.ex-icon-teal{ background:var(--teal-soft); color:var(--teal-700) }\n.ex-icon-navy{ background:var(--bg-cyan); color:var(--navy-700) }\n.e 40 30, 1440 50 L1440 90 L0 90 Z\" fill=\"#dceaf5\"><\u002Fpath>\n      <path d=\"M0 50 C 180 80, 360 20, 540 50 C 720 80, 900 20, 1080 50 C 1260 80, 1440 30, 1440 50 L1440 90 L0 90 Z\" fill=\"#dceaf5\" transform=\"translate(1440 0)\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     PROBLEM\n============================================================ -->\n<section class=\"problem\">\n  <div class=\"wrap\">\n    <div class=\"reveal\">\n      <span class=\"eyebrow\">Masalahnya bukan skill<\u002Fspan>\n      <h2 class=\"section-h\">Bukan tidak bisa kerja. Tapi belum terbiasa menjawab.<\u002Fh2>\n      <p class=\"section-sub\">\n        Banyak pelaut punya pengalaman bagus di kapal. Tapi saat interview, jawaban sering jadi pendek, gugup, atau tidak tersusun. Akhirnya interviewer tidak bisa melihat kemampuan yang sebenarnya.\n      <\u002Fp>\n      <p class=\"section-sub\" style=\"margin-top:12px;\">\n        Di kapal, kamu mungkin sudah biasa kerja di bawah tekanan. Tapi tekanan interview berbeda: harus dengar pertanyaan, susun jawaban, bicara English, dan tetap terlihat yakin dalam waktu singkat.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pain-grid\">\n      <div class=\"pain reveal\" data-delay=\"1\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M9 9h.01M15 9h.01M9 15h6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Tahu kerjaan, tapi blank saat ditanya<\u002Fh3>\n        <p>Kepala tahu jawabannya, tapi saat interviewer bertanya, mulut tiba-tiba macet.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain reveal\" data-delay=\"2\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1018 0 9 9 0 00-18 0z\"><\u002Fpath><path d=\"M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Takut English-nya salah<\u002Fh3>\n        <p>Bukan tidak punya pengalaman. Tapi takut grammar salah, takut salah ucap, lalu jadi tidak percaya diri.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain reveal\" data-delay=\"3\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Jawaban terlalu pendek<\u002Fh3>\n        <p>Jawaban seperti “Yes, Sir” atau “I have experience” belum cukup untuk menunjukkan kemampuanmu.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain reveal\" data-delay=\"1\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M3 12h18M3 18h12\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Tidak tahu cara menjelaskan pengalaman<\u002Fh3>\n        <p>Sea service panjang bisa terdengar biasa saja kalau tidak dijelaskan dengan struktur yang jelas.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain reveal\" data-delay=\"2\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12l2-2 4 4 8-8 4 4\"><\u002Fpath><path d=\"M21 6v6h-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Tidak punya tempat latihan yang aman<\u002Fh3>\n        <p>Mau latihan dengan teman kadang malu. Latihan sendiri sering tidak fokus dan tidak ada yang mengarahkan.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain reveal\" data-delay=\"3\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4l3 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Interview asli jadi tempat latihan pertama<\u002Fh3>\n        <p>Kesempatan asli terlalu mahal untuk dijadikan tempat coba-coba pertama.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     CONSEQUENCE\n============================================================ -->\n<section class=\"consequence\">\n  <div class=\"wrap\">\n    <div class=\"reveal\">\n      <span class=\"eyebrow\">Yang terjadi setelah gagal<\u002Fspan>\n      <h2 class=\"section-h\">Satu interview gagal bisa membuat kontrak mundur.<\u002Fh2>\n      <p class=\"section-sub\">\n        Bagi pelaut, gagal interview bukan sekadar gagal menjawab pertanyaan. Dampaknya bisa nyata: harus menunggu lowongan berikutnya, apply ulang, kontrak tertunda, penghasilan mundur, dan keluarga ikut menunggu lebih lama.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"timeline\">\n      <div class=\"tl-step reveal\" data-delay=\"1\">\n        <div class=\"tl-num\">1<\u002Fdiv>\n        <h4>Interview gagal<\u002Fh4>\n        <p>Jawaban tidak keluar maksimal, padahal pengalaman ada.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"tl-step reveal\" data-delay=\"2\">\n        <div class=\"tl-num\">2<\u002Fdiv>\n        <h4>Apply ulang<\u002Fh4>\n        <p>Mulai dari nol di perusahaan berikutnya.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"tl-step reveal\" data-delay=\"3\">\n        <div class=\"tl-num\">3<\u002Fdiv>\n        <h4>Menunggu lagi<\u002Fh4>\n        <p>Lowongan, dokumen, panggilan — semuanya butuh waktu.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"tl-step reveal\" data-delay=\"4\">\n        <div class=\"tl-num\">4<\u002Fdiv>\n        <h4>Kontrak mundur<\u002Fh4>\n        <p>Penghasilan tertunda, keluarga ikut menunggu.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"after-timeline reveal\">\n      Bukan untuk menakut-nakuti. Tapi supaya kamu tidak masuk interview dalam keadaan belum pernah latihan.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     SOLUTION\n============================================================ -->\n<section class=\"solution\">\n  <div class=\"wrap\">\n    <div class=\"reveal\">\n      <span class=\"eyebrow\">Solusinya sederhana<\u002Fspan>\n      <h2 class=\"section-h\">Latihan dulu sebelum kesempatan interview sungguhan datang.<\u002Fh2>\n      <p class=\"section-sub\">\n        Interview asli bukan tempat latihan pertama. Dengan simulator ini, kamu bisa membiasakan diri mendengar pertanyaan, menyusun jawaban, dan berbicara lebih tenang sebelum menghadapi crewing, owner, atau user interview.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"benefits\">\n      <div class=\"benefit reveal\" data-delay=\"1\"><div class=\"check\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p>Latihan bicara langsung<\u002Fp><\u002Fdiv>\n      <div class=\"benefit reveal\" data-delay=\"2\"><div class=\"check\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p>Membiasakan diri menjawab pertanyaan<\u002Fp><\u002Fdiv>\n      <div class=\"benefit reveal\" data-delay=\"3\"><div class=\"check\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p>Melatih English response<\u002Fp><\u002Fdiv>\n      <div class=\"benefit reveal\" data-delay=\"1\"><div class=\"check\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p>Melatih struktur jawaban<\u002Fp><\u002Fdiv>\n      <div class=\"benefit reveal\" data-delay=\"2\"><div class=\"check\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p>Memahami ritme interview<\u002Fp><\u002Fdiv>\n      <div class=\"benefit reveal\" data-delay=\"3\"><div class=\"check\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p>Membangun percaya diri<\u002Fp><\u002Fdiv>\n      <div class=\"benefit reveal\" data-delay=\"1\"><div class=\"check\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><p>Melatih jawaban agar tidak terlalu pendek<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"note-card reveal\">\n      Bukan untuk membuat jawaban hafalan. Tapi untuk membantu kamu menjawab lebih jelas, rapi, dan profesional.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     CONTOH SAAT KAMU LATIHAN\n============================================================ -->\n<section class=\"example-section\">\n  <div class=\"wrap\">\n    <div class=\"reveal\">\n      <span class=\"eyebrow\">Contoh sesi latihan<\u002Fspan>\n      <h2 class=\"section-h\">Contoh saat kamu latihan.<\u002Fh2>\n      <p class=\"section-sub\">\n        Supaya kamu tidak hanya membayangkan. Seperti ini gambaran sederhana saat sesi latihan berjalan.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"ex-grid\">\n      <article class=\"ex-card reveal\" data-delay=\"1\">\n        <div class=\"ex-head\">\n          <div class=\"ex-icon ex-icon-teal\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ex-label\">Yuliana bertanya<\u002Fdiv>\n            <div class=\"ex-step\">Langkah 1<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <blockquote class=\"ex-quote\">\n          “Tell me about your last vessel experience.”\n        <\u002Fblockquote>\n        <p class=\"ex-micro\">Simulator akan memberikan pertanyaan seperti suasana interview sungguhan.<\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"ex-card reveal\" data-delay=\"2\">\n        <div class=\"ex-head\">\n          <div class=\"ex-icon ex-icon-navy\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z\"><\u002Fpath><path d=\"M19 10v2a7 7 0 01-14 0v-2\"><\u002Fpath><path d=\"M12 19v4M8 23h8\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ex-label\">Kamu menjawab<\u002Fdiv>\n            <div class=\"ex-step\">Langkah 2<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ex-answer\">\n          <div class=\"ex-wave\" aria-hidden=\"true\">\n            <span class=\"bar\" style=\"height:32%; animation-delay:-.1s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:60%; animation-delay:-.3s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:45%; animation-delay:-.5s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:78%; animation-delay:-.7s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:55%; animation-delay:-.9s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:40%; animation-delay:-1.1s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:70%; animation-delay:-1.3s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:50%; animation-delay:-1.5s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:36%; animation-delay:-1.7s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:65%; animation-delay:-1.9s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:44%; animation-delay:-2.1s\"><\u002Fspan>\n            <span class=\"bar\" style=\"height:74%; animation-delay:-2.3s\"><\u002Fspan>\n          <\u002Fdiv>\n          <p>“I worked as Oiler on bulk carrier for 10 months. My main duty was assisting engine room watchkeeping, checking machinery condition, and supporting maintenance work.”<\u002Fp>\n        <\u002Fdiv>\n        <p class=\"ex-micro\">Jawab dengan pengalamanmu sendiri. Tidak harus sempurna, yang penting mulai terbiasa bicara.<\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"ex-card reveal\" data-delay=\"3\">\n        <div class=\"ex-head\">\n          <div class=\"ex-icon ex-icon-orange\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 11l3 3L22 4\"><\u002Fpath><path d=\"M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ex-label\">Feedback latihan<\u002Fdiv>\n            <div class=\"ex-step\">Langkah 3<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <ul class=\"e n        <figure class=\"pz-figure\">\n          <img src=\"91ada8af-170e-4298-adb5-cf3b47266078\" alt=\"Tampilan AI Interview Simulator: panel pengaturan untuk memilih rank, kategori, kapal sebelumnya, kapal tujuan, dan level English\" width=\"1400\" height=\"788\" loading=\"lazy\" decoding=\"async\">\n        <\u002Ffigure>\n        <p class=\"pz-caption\">Atur rank, pengalaman kapal, dan kapal target sebelum sesi interview dimulai.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     MODES\n============================================================ -->\n<section class=\"modes-section\" id=\"modes\">\n  <div class=\"wrap\">\n    <div class=\"reveal\">\n      <span class=\"eyebrow\">Pilih mode latihan<\u002Fspan>\n      <h2 class=\"section-h\">Pilih jenis interview yang ingin kamu latih.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"modes\">\n      <article class=\"mode-card a reveal\" data-delay=\"1\">\n        <div class=\"mode-icon\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M22 11h-6M22 8h-6M22 14h-3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Interview Crewing<\u002Fh3>\n        <p class=\"mode-copy\">\n          Latihan pertanyaan umum dari crewing atau manning agency. Cocok untuk mempersiapkan jawaban tentang pengalaman kerja, dokumen, availability, salary, attitude, dan alasan apply.\n        <\u002Fp>\n        <div class=\"sub-tags\">\n          <span class=\"sub-tag\">Experience<\u002Fspan>\n          <span class=\"sub-tag\">Availability<\u002Fspan>\n          <span class=\"sub-tag\">Salary<\u002Fspan>\n          <span class=\"sub-tag\">Attitude<\u002Fspan>\n          <span class=\"sub-tag\">Sign-off reason<\u002Fspa 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>User / Technical Interview<\u002Fh3>\n        <p class=\"mode-copy\">\n          Latihan pertanyaan technical sesuai bidang. Cocok untuk deck dan engine crew yang akan menghadapi owner, user, atau technical superintendent.\n        <\u002Fp>\n        <div class=\"sub-tags\">\n          <span class=\"sub-tag\">Technical Deck<\u002Fspan>\n          <span class=\"sub-tag\">Technical Engine<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"q-examples\">\n          <div class=\"q-examples-label\">Contoh Technical Deck<\u002Fdiv>\n          <ul class=\"q-list\">\n            <li>“What will you do during restricted visibility?”<\u002Fli>\n            <li>“How do you prepare passage plan?”<\u002Fli>\n            <li>“What is your action during emergency situation?”<\u002Fli>\n          <\u002Ful>\n          <div class=\"q-examples-label\" style=\"margin-top:12px;\">Contoh Technical Engine<\u002Fdiv>\n          <ul class=\"q-list\">\n            <li>“What will you check if purifier overflow?”<\u002Fli>\n            <li>“How do you handle generator blackout?”<\u002Fli>\n            <li>“What is your watchkeeping routine in engine room?”<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <ul class=\"fit-list\">\n          <li>Deck Officer<\u002Fli>\n          <li>Engineer Officer<\u002Fli>\n          <li>Rating berpengalaman<\u002Fli>\n          <li>Pelaut yang akan menghadapi user interview<\u002Fli>\n          <li>Pelaut yang ingin latihan jawaban teknis<\u002Fli>\n        <\u002Ful>\n        <a class=\"mode-cta\" href=\"#pricing\">\n          Latihan Technical Interview\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Interview Crewing fokus pada pengalaman kerja, dokumen, availability, salary, attitude, dan kesiapan join. Technical Interview fokus pada pertanyaan teknis sesuai bidang Deck atau Engine.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" type=\"button\" aria-expanded=\"false\">\n          Apakah ini sama seperti membaca contoh jawaban?\n          <span class=\"arrow\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Tidak. Membaca contoh jawaban membantu kamu paham. Latihan suara membantu kamu membiasakan diri menjawab langsung seperti suasana interview asli.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" type=\"button\" aria-expanded=\"false\">\n          Apakah ini untuk Deck dan Engine?\n          <span class=\"arrow\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 12 15 18 9\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">Ya. Kamu bisa memilih Technical Deck atau Technical Engine sesuai bidangmu.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ============================================================\n     FOOTER\n============================================================ -->\n<footer>\n  <div class=\"wrap footer-inner\">\n    <div class=\"footer-brand\">\n      <span class=\"brand-mark\" aria-hidden=\"true\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2L3 7l9 5 9-5-9-5z\"><\u002Fpath><path d=\"M3 17l9 5 9-5\"><\u002Fpath><path d=\"M3 12l9 5 9-5\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n      Daily Loker Pelaut\n    <\u002Fdiv>\n    <div class=\"footer-copy\">© <span id=\"yr\"><\u002Fspan> Daily Loker Pelaut. Tempat latihan aman sebelum interview sungguhan.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ============================================================\n     STICKY MOBILE CTA\n============================================================ -->\n<div class=\"sticky-cta\" id=\"stickyCta\" aria-hidden=\"true\">\n  <div class=\"sticky-cta-left\">\n    <div class=\"sticky-cta-eyebrow\">Promo Beta Tester<\u002Fdiv>\n    <div class=\"sticky-cta-price\">3 Credits · Rp49.000 <s>Rp99.000<\u002Fs><\u002Fdiv>\n  <\u002Fdiv>\n  <!-- payment link placeholder -->\n  <a class=\"btn btn-primary\" href=\"#pricing\">Ambil Akses<\u002Fa>\n<\u002Fdiv>\n\n<script>\n  // Year\n  document.getElementById('yr').textContent = new Date().getFullYear();\n\n  // Scroll reveal\n  const reveals = document.querySelectorAll('.reveal');\n  if ('IntersectionObserver' in window){\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{\n        if (e.isIntersecting){\n          e.target.classList.add('in');\n          io.unobserve(e.target);\n        }\n      });\n    }, { rootMargin:'0px 0px -8% 0px', threshold:0.06 });\n    reveals.forEach(el=> io.observe(el));\n  } else {\n    reveals.forEach(el=> el.classList.add('in'));\n  }\n\n  // FAQ accordion\n  document.querySelectorAll('.faq-item').forEach(item=>{\n    const btn = item.querySelector('.faq-q');\n    btn.addEventListener('click', ()=>{\n      const isOpen = item.classList.contains('open');\n      // close others\n      document.querySelectorAll('.faq-item.open').forEach(o=>{\n        if (o!==item){\n          o.classList.remove('open');\n          o.querySelector('.faq-q').setAttribute('aria-expanded','false');\n        }\n      });\n      item.classList.toggle('open', !isOpen);\n      btn.setAttribute('aria-expanded', String(!isOpen));\n    });\n  });\n\n  // Sticky mobile CTA: show after small scroll, hide near pricing/footer\n  const sticky = document.getElementById('stickyCta');\n  const pricingEl = document.getElementById('pricing');\n  let lastShow = false;\n  function updateSticky(){\n    const y = window.scrollY;\n    const winH = window.innerHeight;\n    const docH = document.documentElement.scrollHeight;\n    const nearBottom = (y + winH) > (docH - 120);\n    let inPricing = false;\n    if (pricingEl){\n      const r = pricingEl.getBoundingClientRect();\n      inPricing = r.top < winH * 0.6 && r.bottom > winH * 0.2;\n    }\n    const show = y > 360 && !nearBottom && !inPricing;\n    if (show !== lastShow){\n      sticky.classList.toggle('show', show);\n      sticky.setAttribute('aria-hidden', String(!show));\n      lastShow = show;\n    }\n  }\n  window.addEventListener('scroll', updateSticky, { passive:true });\n  window.addEventListener('resize', updateSticky);\n  updateSticky();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
